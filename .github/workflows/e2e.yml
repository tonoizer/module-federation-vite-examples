name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    strategy:
      fail-fast: false
      matrix:
        framework: [alpine, angular, lit, nuxt, preact, react, solid, svelte, tanstack, vinext, vue]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.16.0

      - name: Install PNPM
        run: npm install -g pnpm@10

      - name: Configure PNPM store
        run: pnpm config set store-dir ~/.pnpm-store/v10

      - name: Restore PNPM store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.pnpm-store/v10
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-offline

      - name: Test vite 7
        if: ${{ !contains(fromJSON('["nuxt","react","tanstack","vinext"]'), matrix.framework) }}
        uses: ./.github/actions/test-vite
        with:
          vite-version: "7"
          framework: ${{ matrix.framework }}

      - name: Test vite 8
        if: matrix.framework != 'angular'
        uses: ./.github/actions/test-vite
        with:
          vite-version: "8"
          framework: ${{ matrix.framework }}
