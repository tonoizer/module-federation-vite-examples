name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm ls @playwright/test --depth=0 --json | jq -r '.[0].devDependencies[\"@playwright/test\"].version')" >> $GITHUB_OUTPUT

      - name: Cache playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Test vite 5
        uses: ./.github/actions/test-vite
        with:
          vite-version: "5"
          framework: ${{ matrix.framework }}

      - name: Test vite 6
        uses: ./.github/actions/test-vite
        with:
          vite-version: "6"
          framework: ${{ matrix.framework }}

      - name: Test vite 7
        uses: ./.github/actions/test-vite
        with:
          vite-version: "7"
          framework: ${{ matrix.framework }}

      - name: Test vite 8 beta
        uses: ./.github/actions/test-vite
        with:
          vite-version: "8.0.0-beta.16"
          framework: ${{ matrix.framework }}

      - name: Test rolldown-vite
        uses: ./.github/actions/test-vite
        with:
          vite-version: rolldown-vite
          framework: ${{ matrix.framework }}
