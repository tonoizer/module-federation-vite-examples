name: Test Vite Version
description: Run e2e tests for a specific vite version and framework

inputs:
  vite-version:
    description: Vite version to test (e.g. "7", "8"). If empty, skip vite update.
    required: false
    default: ""
  framework:
    description: Framework to test (e.g. "react", "vue")
    required: true

runs:
  using: composite
  steps:
    - name: Update to vite ${{ inputs.vite-version }}
      if: inputs.vite-version != ''
      shell: bash
      run: |
        pnpm up -r vite@^${{ inputs.vite-version }}

    - name: Test dev
      if: inputs.framework != 'nuxt'
      shell: bash
      run: pnpm exec playwright test
      env:
        PLAYWRIGHT_TEST_COMMAND: pnpm ${{ inputs.framework }}:dev

    - name: Test build
      shell: bash
      run: cd ${{ inputs.framework }} && pnpm build

    - name: Test preview
      if: inputs.framework != 'svelte'
      shell: bash
      run: pnpm exec playwright test
      env:
        PLAYWRIGHT_TEST_COMMAND: pnpm ${{ inputs.framework }}:preview
